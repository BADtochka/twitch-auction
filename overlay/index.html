<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Twitch Auction Overlay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: transparent;
      color: #fff;
      width: 340px;
    }

    #overlay {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
    }

    /* Lot info */
    #lot-box {
      background: rgba(20, 20, 28, 0.92);
      border: 1px solid rgba(145, 71, 255, 0.4);
      border-radius: 10px;
      padding: 10px 14px;
      display: none;
    }
    #lot-box.visible { display: block; }

    #lot-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .lot-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #adadb8;
    }

    #timer {
      font-size: 13px;
      font-weight: 600;
      color: #a970ff;
    }

    #timer.warning { color: #ff6b6b; }

    /* Top bids */
    #bids-box {
      background: rgba(20, 20, 28, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 10px 14px;
      display: none;
    }
    #bids-box.visible { display: block; }

    #bids-title {
      font-size: 11px;
      color: #adadb8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    #bids-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .bid-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bid-rank {
      width: 18px;
      text-align: right;
      color: #52525b;
      font-size: 11px;
      flex-shrink: 0;
    }
    .bid-rank.first { color: #fbbf24; }

    .bid-username {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bid-amount {
      font-weight: 700;
      color: #a970ff;
      tabular-nums: true;
      flex-shrink: 0;
    }

    /* Winner */
    #winner-box {
      background: rgba(20, 20, 28, 0.95);
      border: 2px solid #fbbf24;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      display: none;
    }
    #winner-box.visible { display: block; }

    #winner-label {
      font-size: 11px;
      color: #fbbf24;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    #winner-name {
      font-size: 20px;
      font-weight: 800;
    }
    #winner-amount {
      font-size: 14px;
      color: #adadb8;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="lot-box">
      <div id="lot-title">—</div>
      <div class="lot-meta">
        <span id="timer">—</span>
        <span id="leading-label"></span>
      </div>
    </div>

    <div id="winner-box">
      <div id="winner-label">🏆 Победитель</div>
      <div id="winner-name"></div>
      <div id="winner-amount"></div>
    </div>

    <div id="bids-box">
      <div id="bids-title">Топ ставок</div>
      <div id="bids-list"></div>
    </div>
  </div>

  <script>
    const PORT = location.port || "3000";
    const es = new EventSource(`http://localhost:${PORT}/overlay/events`);

    let state = null;

    es.addEventListener("auction_state", (e) => {
      state = JSON.parse(e.data);
      render();
    });

    es.addEventListener("bid_approved", () => {
      // state update will follow
    });

    es.addEventListener("timer_tick", (e) => {
      const data = JSON.parse(e.data);
      if (state) {
        state.timer_left_seconds = data.seconds;
        renderTimer();
      }
    });

    es.addEventListener("auction_finished", (e) => {
      const winner = JSON.parse(e.data);
      showWinner(winner);
    });

    function render() {
      if (!state) return;

      const lotBox = document.getElementById("lot-box");
      const bidsBox = document.getElementById("bids-box");
      const winnerBox = document.getElementById("winner-box");

      if (state.status === "finished") return;

      winnerBox.classList.remove("visible");
      lotBox.classList.add("visible");

      document.getElementById("lot-title").textContent = state.config?.lot_title ?? "—";

      renderTimer();

      const approved = (state.bids ?? [])
        .filter(b => b.status === "approved" || b.status === "winner")
        .sort((a, b) => b.amount - a.amount)
        .slice(0, 5);

      if (approved.length > 0) {
        bidsBox.classList.add("visible");
        const list = document.getElementById("bids-list");
        list.innerHTML = approved.map((bid, i) => `
          <div class="bid-row">
            <span class="bid-rank ${i === 0 ? 'first' : ''}">#${i + 1}</span>
            <span class="bid-username">${escHtml(bid.username)}</span>
            <span class="bid-amount">${bid.amount.toLocaleString("ru-RU")} ${escHtml(state.config?.currency_label ?? "")}</span>
          </div>
        `).join("");
      } else {
        bidsBox.classList.remove("visible");
      }
    }

    function renderTimer() {
      if (!state) return;
      const el = document.getElementById("timer");
      const secs = state.timer_left_seconds ?? 0;
      el.textContent = formatTime(secs);
      el.className = secs <= 30 && secs > 0 ? "warning" : "";
    }

    function showWinner(winner) {
      document.getElementById("lot-box").classList.remove("visible");
      document.getElementById("bids-box").classList.remove("visible");
      const box = document.getElementById("winner-box");
      box.classList.add("visible");
      if (winner) {
        document.getElementById("winner-name").textContent = winner.username;
        document.getElementById("winner-amount").textContent =
          `${winner.amount.toLocaleString("ru-RU")} ${state?.config?.currency_label ?? ""}`;
      } else {
        document.getElementById("winner-name").textContent = "Нет победителя";
        document.getElementById("winner-amount").textContent = "";
      }
    }

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m}:${String(sec).padStart(2, "0")}`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
