<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Winner Widget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: transparent;
      color: #fff;
      width: 340px;
      padding: 12px;
    }

    #winner-box {
      background: rgba(20, 20, 28, 0.95);
      border: 2px solid #fbbf24;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      display: none;
    }
    #winner-box.visible { display: block; }

    #winner-label {
      font-size: 11px;
      color: #fbbf24;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    #winner-name {
      font-size: 20px;
      font-weight: 800;
    }
    #winner-amount {
      font-size: 14px;
      color: #adadb8;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div id="winner-box">
    <div id="winner-label">🏆 Победитель</div>
    <div id="winner-name"></div>
    <div id="winner-amount"></div>
  </div>

  <script>
    const PORT = location.port || "3000";
    const es = new EventSource(`http://localhost:${PORT}/overlay/events`);

    let currencyLabel = "";

    es.addEventListener("auction_state", (e) => {
      const state = JSON.parse(e.data);
      currencyLabel = state.config?.currency_label ?? "";
      if (state.status === "finished") {
        const winner = (state.bids ?? []).find(b => b.status === "winner") ?? null;
        showWinner(winner);
      }
    });

    es.addEventListener("auction_finished", (e) => {
      showWinner(JSON.parse(e.data));
    });

    function showWinner(winner) {
      const box = document.getElementById("winner-box");
      box.classList.add("visible");
      if (winner) {
        document.getElementById("winner-name").textContent = winner.username;
        document.getElementById("winner-amount").textContent =
          `${winner.amount.toLocaleString("ru-RU")} ${currencyLabel}`;
      } else {
        document.getElementById("winner-name").textContent = "Нет победителя";
        document.getElementById("winner-amount").textContent = "";
      }
    }
  </script>
</body>
</html>
